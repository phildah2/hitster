<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hitster+">
<meta name="theme-color" content="#1a1a2e">
<title>Hitster+ Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1a1a2e; --bg2: #16213e; --accent: #e94560; --accent2: #ff6b6b;
    --text: #fff; --text-dim: #8888aa; --card-bg: #0f3460; --success: #4ade80;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
  }
  .header { text-align: center; padding: 16px 16px 8px; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px; gap: 16px;
  }
  .screen { display: none; width: 100%; max-width: 400px; text-align: center; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .home-icon {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 26px; display: flex; align-items: center; justify-content: center;
    font-size: 48px; box-shadow: 0 10px 40px rgba(233,69,96,0.3);
  }
  .home-text { font-size: 15px; color: var(--text-dim); line-height: 1.5; padding: 0 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 28px; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; cursor: pointer; width: 100%; max-width: 300px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid rgba(255,255,255,0.1); }
  .btn-small { padding: 10px 20px; font-size: 14px; border-radius: 10px; }

  /* QR Scanner */
  #qr-reader { width: 100%; max-width: 320px; border-radius: 16px; overflow: hidden; background: #000; }
  #qr-reader video { border-radius: 16px; }
  #qr-reader__scan_region { border: none !important; }
  #qr-reader__dashboard { display: none !important; }
  #qr-reader img[alt="Info icon"] { display: none !important; }
  #qr-reader__header_message { display: none !important; }

  /* Manual Input */
  .manual-input-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .manual-input-row input {
    width: 80px; padding: 12px; border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px; background: var(--bg2); color: var(--text);
    font-size: 24px; font-weight: 700; text-align: center; outline: none;
  }
  .manual-input-row input:focus { border-color: var(--accent); }
  .or-divider { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

  /* Playing Screen */
  .playing-card {
    background: var(--card-bg); border-radius: 24px; padding: 32px 24px;
    width: 100%; max-width: 300px;
  }
  .playing-card .card-number { font-size: 64px; font-weight: 800; color: var(--accent); line-height: 1; }
  .playing-card .card-label { font-size: 15px; color: var(--text-dim); margin-top: 6px; }
  .playing-status { display: flex; align-items: center; gap: 10px; font-size: 15px; color: var(--success); font-weight: 600; }
  .pulse-dot { width: 12px; height: 12px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* Spotify Embed - hidden but audible */
  #spotify-embed-container {
    position: fixed; bottom: -200px; left: 0; width: 300px; height: 80px;
    opacity: 0; pointer-events: none;
  }
  #spotify-embed-container.debug-visible {
    position: relative; bottom: auto; left: auto;
    opacity: 1; pointer-events: auto;
    width: 100%; max-width: 300px; height: 80px;
    border-radius: 12px; overflow: hidden;
  }

  /* Debug Log */
  .debug-log {
    background: #000; border: 1px solid #333; border-radius: 10px;
    padding: 10px; width: 100%; max-width: 380px;
    font-family: monospace; font-size: 11px; color: #0f0;
    max-height: 120px; overflow-y: auto; text-align: left;
    word-break: break-all;
  }
  .debug-log .err { color: #f55; }
  .debug-log .warn { color: #fa0; }
  .debug-log .info { color: #0af; }

  /* Song List */
  .song-grid { display: grid; grid-template-columns: 1fr; gap: 6px; width: 100%; max-height: 55vh; overflow-y: auto; }
  .song-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg2); border-radius: 8px; font-size: 13px; text-align: left; }
  .song-item .song-num { font-weight: 800; color: var(--accent); min-width: 26px; }
  .song-item .song-title { font-weight: 600; }
  .song-item .song-artist { color: var(--text-dim); font-size: 11px; }
  .song-item .song-year { font-weight: 700; color: var(--accent); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>HITSTER<span>+</span></h1>
  <div class="subtitle">Erweiterungsset - 30 Karten</div>
</div>

<div class="content">
  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-icon">&#127925;</div>
    <div class="home-text">Scanne den QR-Code oder gib die Kartennummer ein.</div>
    <button class="btn btn-primary" onclick="startScanner()">&#128247; QR-Code scannen</button>
    <div class="or-divider">oder</div>
    <div class="manual-input-row">
      <input type="number" id="manualInput" min="1" max="30" placeholder="Nr." inputmode="numeric">
      <button class="btn btn-secondary btn-small" onclick="playManual()">&#9654; Play</button>
    </div>
    <div class="debug-log" id="debugLog"><span class="info">App bereit.</span></div>
  </div>

  <!-- SCAN -->
  <div id="screen-scan" class="screen">
    <div id="qr-reader"></div>
    <div style="font-size:13px;color:var(--text-dim)">Halte die Kamera auf den QR-Code</div>
    <div class="debug-log" id="debugLogScan"></div>
    <button class="btn btn-secondary btn-small" onclick="stopScanner()">Abbrechen</button>
  </div>

  <!-- PLAYING -->
  <div id="screen-playing" class="screen">
    <div class="playing-card">
      <div class="card-label">Karte</div>
      <div class="card-number" id="playingNumber">?</div>
      <div class="card-label">von 30</div>
    </div>
    <div class="playing-status"><div class="pulse-dot"></div> Wird abgespielt...</div>
    <div id="spotify-embed-container"></div>
    <div style="font-size:13px;color:var(--text-dim);padding:8px 16px">
      &#128266; Musik l&auml;uft direkt hier - Spotify bleibt im Hintergrund!<br>
      Dr&uuml;cke Play im eingebetteten Player falls n&ouml;tig.
    </div>
    <button class="btn btn-primary" onclick="showHome()">&#127912; N&auml;chste Karte</button>
    <button class="btn btn-small" style="background:none;color:var(--text-dim)" onclick="showSongList()">
      &#128065; Alle Songs (Spoiler!)
    </button>
  </div>

  <!-- SONG LIST -->
  <div id="screen-songs" class="screen">
    <h2 style="font-size:18px">Alle 30 Songs</h2>
    <div class="song-grid" id="songGrid"></div>
    <button class="btn btn-secondary btn-small" onclick="showHome()" style="margin-top:8px">&#8592; Zur&uuml;ck</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
// ── SONGS ──
const SONGS = [
  { id:1,  year:2016, title:"Faded",                    artist:"Alan Walker",                     spotify:"698ItKASDavgwZ3WjaWjtz" },
  { id:2,  year:2016, title:"Stressed Out",             artist:"Twenty One Pilots",               spotify:"3CRDbSIZ4r5MsZ0YwxuEkn" },
  { id:3,  year:2016, title:"Cheap Thrills",            artist:"Sia ft. Sean Paul",               spotify:"2ONIJ40u0Attbm3miIIpNO" },
  { id:4,  year:2017, title:"Shape of You",             artist:"Ed Sheeran",                      spotify:"7qiZfU4dY1lWllzX7mPBI3" },
  { id:5,  year:2017, title:"Despacito",                artist:"Luis Fonsi ft. Daddy Yankee",     spotify:"6habFhsOp2NvshLv26DqMb" },
  { id:6,  year:2017, title:"Something Just Like This", artist:"The Chainsmokers & Coldplay",     spotify:"6RUKPb4LETWmmr3iAEQktW" },
  { id:7,  year:2017, title:"Havana",                   artist:"Camila Cabello",                  spotify:"0ofbQMrRDsUaVKq2mGLEAb" },
  { id:8,  year:2018, title:"In My Mind",               artist:"Dynoro & Gigi D'Agostino",        spotify:"1sg2pOVDSJ0HKQBtAMe0Rt" },
  { id:9,  year:2018, title:"Shallow",                  artist:"Lady Gaga & Bradley Cooper",      spotify:"5884Fdng3toNffOJYmJMrs" },
  { id:10, year:2018, title:"Cordula Grün",             artist:"Josh.",                           spotify:"04L3tgiDrMKbfVeE6r6Ydy" },
  { id:11, year:2019, title:"Dance Monkey",             artist:"Tones and I",                     spotify:"2XU0oxnq2qxCpomAAuJY8K" },
  { id:12, year:2019, title:"Señorita",                 artist:"Shawn Mendes & Camila Cabello",   spotify:"3dx3a4FAEtGXEyMakvl1jt" },
  { id:13, year:2019, title:"bad guy",                  artist:"Billie Eilish",                   spotify:"2Fxmhks0bxGSBdJ92vM42m" },
  { id:14, year:2019, title:"Old Town Road",            artist:"Lil Nas X",                       spotify:"2YpeDb67231RjR0MgVLzsG" },
  { id:15, year:2020, title:"Blinding Lights",          artist:"The Weeknd",                      spotify:"0VjIjW4GlUZAMYd2vXMi3b" },
  { id:16, year:2020, title:"Watermelon Sugar",         artist:"Harry Styles",                    spotify:"6UelLqGlWMcVH1E5c4H7lY" },
  { id:17, year:2020, title:"Roller",                   artist:"Apache 207",                      spotify:"5dhQeuLGmlhfwlI6BWfSpo" },
  { id:18, year:2020, title:"Savage Love",              artist:"Jawsh 685 & Jason Derulo",        spotify:"2rP1ip1n8FcGhKUmv6nBGW" },
  { id:19, year:2021, title:"Wellerman",                artist:"Nathan Evans",                    spotify:"6uDhDVnV8khKCqf7UONNZ0" },
  { id:20, year:2021, title:"Stay",                     artist:"The Kid LAROI & Justin Bieber",   spotify:"5HCyWlXZPP0y6Gqq8TgA20" },
  { id:21, year:2021, title:"Shivers",                  artist:"Ed Sheeran",                      spotify:"6bQfNiqyCX7UaQSvVVGo4I" },
  { id:22, year:2021, title:"Levitating",               artist:"Dua Lipa",                        spotify:"39LLxExYz6ewLAcYrzQQyP" },
  { id:23, year:2022, title:"As It Was",                artist:"Harry Styles",                    spotify:"4Dvkj6JhhA12EX05fT7y2e" },
  { id:24, year:2022, title:"Heat Waves",               artist:"Glass Animals",                   spotify:"44NIj3aVAdvni1M2jlKmHf" },
  { id:25, year:2022, title:"Calm Down",                artist:"Rema & Selena Gomez",             spotify:"0WtM2NBVQNNJLh6scP13H8" },
  { id:26, year:2023, title:"Flowers",                  artist:"Miley Cyrus",                     spotify:"0yLdNVWF3Srea0uzk55zFn" },
  { id:27, year:2023, title:"Komet",                    artist:"Apache 207 & Udo Lindenberg",     spotify:"7oQepKHmXDaPC3rgeLRvQu" },
  { id:28, year:2023, title:"Dance The Night",          artist:"Dua Lipa",                        spotify:"1vYXt7VSjH9JIM5oRRo7vA" },
  { id:29, year:2024, title:"Espresso",                 artist:"Sabrina Carpenter",               spotify:"2qSkIjg1o9h3YT9RAgYN75" },
  { id:30, year:2024, title:"Die With A Smile",         artist:"Lady Gaga & Bruno Mars",          spotify:"2plbrEY59IikOBgBGLjaoe" },
];

// ── STATE ──
let scanner = null;
let isScanning = false;
let scanProcessing = false; // prevent double-scan

// ── DEBUG LOG ──
function log(msg, type = '') {
  const el = document.getElementById('debugLog');
  const el2 = document.getElementById('debugLogScan');
  const line = `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  if (el) { el.innerHTML += line; el.scrollTop = el.scrollHeight; }
  if (el2) { el2.innerHTML += line; el2.scrollTop = el2.scrollHeight; }
  console.log(msg);
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showHome() {
  if (isScanning) stopScanner();
  scanProcessing = false;
  showScreen('screen-home');
  document.getElementById('manualInput').value = '';
}

// ── QR SCANNER ──
function startScanner() {
  showScreen('screen-scan');
  document.getElementById('debugLogScan').innerHTML = '';
  log('Scanner wird gestartet...', 'info');
  scanProcessing = false;

  scanner = new Html5Qrcode("qr-reader");
  isScanning = true;

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
    (decodedText, decodedResult) => {
      log('QR erkannt: "' + decodedText + '"', 'info');
      onScanSuccess(decodedText);
    },
    (errorMessage) => {
      // Nur loggen wenn es kein "QR code not found" ist
    }
  ).then(() => {
    log('Kamera aktiv. Scanne...', 'info');
  }).catch(err => {
    log('Kamera-Fehler: ' + err, 'err');
    alert("Kamera konnte nicht gestartet werden.");
    showHome();
  });
}

function stopScanner() {
  if (scanner && isScanning) {
    scanner.stop().then(() => {
      scanner.clear();
      isScanning = false;
      log('Scanner gestoppt.', 'warn');
    }).catch((e) => {
      log('Stop-Fehler: ' + e, 'err');
      isScanning = false;
    });
  }
}

function onScanSuccess(decodedText) {
  if (scanProcessing) {
    log('Bereits in Verarbeitung, ignoriere...', 'warn');
    return;
  }
  scanProcessing = true;

  let cardNum = null;

  // Format 1: URL mit ?card=XX
  const urlMatch = decodedText.match(/[?&]card=(\d{1,2})/i);
  if (urlMatch) {
    cardNum = parseInt(urlMatch[1]);
    log('URL-Format erkannt, Karte: ' + cardNum, 'info');
  }

  // Format 2: HITSTER-XX
  if (!cardNum) {
    const textMatch = decodedText.match(/HITSTER-?(\d{1,2})/i);
    if (textMatch) {
      cardNum = parseInt(textMatch[1]);
      log('HITSTER-Format erkannt, Karte: ' + cardNum, 'info');
    }
  }

  // Format 3: Nur eine Zahl
  if (!cardNum) {
    const numOnly = parseInt(decodedText.trim());
    if (numOnly >= 1 && numOnly <= 30) {
      cardNum = numOnly;
      log('Nummer erkannt, Karte: ' + cardNum, 'info');
    }
  }

  if (cardNum && cardNum >= 1 && cardNum <= 30) {
    log('Starte Song fuer Karte ' + cardNum + '...', 'info');

    // Scanner stoppen, dann Song abspielen
    if (scanner && isScanning) {
      scanner.stop().then(() => {
        scanner.clear();
        isScanning = false;
        log('Scanner gestoppt, starte Player...', 'info');
        playSong(cardNum);
      }).catch(e => {
        log('Stop-Fehler, spiele trotzdem: ' + e, 'warn');
        isScanning = false;
        playSong(cardNum);
      });
    } else {
      playSong(cardNum);
    }
  } else {
    log('Kein gueltiger Karten-Code: "' + decodedText + '"', 'err');
    scanProcessing = false;
  }
}

// ── MANUAL INPUT ──
function playManual() {
  const input = document.getElementById('manualInput');
  const num = parseInt(input.value);
  if (num >= 1 && num <= 30) {
    log('Manuell: Karte ' + num, 'info');
    playSong(num);
  } else {
    log('Ungueltige Nummer: ' + input.value, 'err');
    input.style.borderColor = '#e94560';
    setTimeout(() => input.style.borderColor = 'rgba(255,255,255,0.15)', 1000);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('manualInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') playManual();
  });
});

// ── PLAY SONG (Spotify Embed - bleibt in der App!) ──
function playSong(cardNum) {
  const song = SONGS.find(s => s.id === cardNum);
  if (!song) {
    log('Song nicht gefunden fuer Karte ' + cardNum, 'err');
    return;
  }

  log('Lade Spotify-Embed fuer: Karte ' + cardNum, 'info');

  // Update playing screen
  document.getElementById('playingNumber').textContent = cardNum;
  showScreen('screen-playing');

  // Spotify Embed Player (spielt direkt in der Web-App!)
  const container = document.getElementById('spotify-embed-container');
  container.className = 'debug-visible';
  container.innerHTML = `<iframe
    src="https://open.spotify.com/embed/track/${song.spotify}?utm_source=generator&theme=0"
    width="100%" height="80" frameBorder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="eager"
    style="border-radius:12px"></iframe>`;

  log('Spotify-Embed geladen. Druecke Play im Player!', 'info');
}

// ── URL PARAMETER ──
function checkUrlParam() {
  const params = new URLSearchParams(window.location.search);
  const cardParam = params.get('card');
  if (cardParam) {
    const cardNum = parseInt(cardParam);
    log('URL-Parameter erkannt: card=' + cardParam, 'info');
    if (cardNum >= 1 && cardNum <= 30) {
      window.history.replaceState({}, '', window.location.pathname);
      setTimeout(() => playSong(cardNum), 500);
    }
  }
}
document.addEventListener('DOMContentLoaded', checkUrlParam);

// ── SONG LIST ──
function showSongList() {
  const grid = document.getElementById('songGrid');
  grid.innerHTML = SONGS.map(s => `
    <div class="song-item">
      <div class="song-num">${String(s.id).padStart(2,'0')}</div>
      <div style="flex:1"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div>
      <div class="song-year">${s.year}</div>
    </div>`).join('');
  showScreen('screen-songs');
}
</script>
</body>
</html>
