<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hitster+">
<meta name="theme-color" content="#1a1a2e">
<title>Hitster+ Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1a1a2e; --bg2: #16213e; --accent: #e94560; --accent2: #ff6b6b;
    --text: #fff; --text-dim: #8888aa; --card-bg: #0f3460; --success: #4ade80;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .header { text-align: center; padding: 16px 16px 8px; flex-shrink: 0; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px; gap: 16px;
  }
  .screen { display: none; width: 100%; max-width: 400px; text-align: center; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .home-icon {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 26px; display: flex; align-items: center; justify-content: center;
    font-size: 48px; box-shadow: 0 10px 40px rgba(233,69,96,0.3);
  }
  .home-text { font-size: 15px; color: var(--text-dim); line-height: 1.5; padding: 0 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 28px; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; cursor: pointer; width: 100%; max-width: 300px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid rgba(255,255,255,0.1); }
  .btn-spotify { background: #1DB954; color: white; }
  .btn-small { padding: 10px 20px; font-size: 14px; border-radius: 10px; }

  #qr-reader { width: 100%; max-width: 320px; border-radius: 16px; overflow: hidden; background: #000; }
  #qr-reader video { border-radius: 16px; }
  #qr-reader__scan_region { border: none !important; }
  #qr-reader__dashboard { display: none !important; }
  #qr-reader img[alt="Info icon"] { display: none !important; }
  #qr-reader__header_message { display: none !important; }

  .manual-input-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .manual-input-row input {
    width: 80px; padding: 12px; border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px; background: var(--bg2); color: var(--text);
    font-size: 24px; font-weight: 700; text-align: center; outline: none;
  }
  .manual-input-row input:focus { border-color: var(--accent); }
  .or-divider { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

  .playing-card {
    background: var(--card-bg); border-radius: 24px; padding: 32px 24px;
    width: 100%; max-width: 300px;
  }
  .playing-card .card-number { font-size: 64px; font-weight: 800; color: var(--accent); line-height: 1; }
  .playing-card .card-label { font-size: 15px; color: var(--text-dim); margin-top: 6px; }
  .playing-status { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; color: var(--success); font-weight: 600; }
  .pulse-dot { width: 12px; height: 12px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  .debug-log {
    background: #000; border: 1px solid #333; border-radius: 10px;
    padding: 10px; width: 100%; max-width: 380px;
    font-family: monospace; font-size: 11px; color: #0f0;
    max-height: 120px; overflow-y: auto; text-align: left; word-break: break-all;
  }
  .debug-log .err { color: #f55; }
  .debug-log .warn { color: #fa0; }
  .debug-log .info { color: #0af; }

  .spotify-badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
    background: rgba(29,185,84,0.15); border-radius: 20px; font-size: 12px; color: #1DB954;
  }

  .setup-box {
    background: var(--bg2); border-radius: 16px; padding: 20px; width: 100%;
    text-align: left; font-size: 14px; line-height: 1.6;
  }
  .setup-box h3 { color: var(--accent); margin-bottom: 8px; font-size: 16px; }
  .setup-box code { background: #000; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .setup-box ol { padding-left: 20px; }
  .setup-box li { margin-bottom: 6px; }
  .setup-box input {
    width: 100%; padding: 10px; margin-top: 8px; border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px; background: #000; color: var(--text); font-family: monospace; font-size: 14px;
  }

  .song-grid { display: grid; grid-template-columns: 1fr; gap: 6px; width: 100%; max-height: 55vh; overflow-y: auto; }
  .song-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg2); border-radius: 8px; font-size: 13px; text-align: left; }
  .song-item .song-num { font-weight: 800; color: var(--accent); min-width: 26px; }
  .song-item .song-title { font-weight: 600; }
  .song-item .song-artist { color: var(--text-dim); font-size: 11px; }
  .song-item .song-year { font-weight: 700; color: var(--accent); font-size: 13px; }

  .error-msg { color: var(--accent); font-size: 13px; padding: 8px; background: rgba(233,69,96,0.1); border-radius: 8px; }
</style>

    <div id="playError" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" onclick="showHome()" style="margin-top:8px">&#127912; N&auml;chste Karte</button>
    <button class="btn btn-small" style="background:none;color:var(--text-dim)" onclick="stopPlayback()">
      &#9724; Stopp
    </button>
    <button class="btn btn-small" style="background:none;color:var(--text-dim)" onclick="showSongList()">
      &#128065; Alle Songs (Spoiler!)
    </button>
    <div class="debug-log" id="debugLogPlay"></div>
  </div>

  <!-- SONG LIST -->
  <div id="screen-songs" class="screen">
    <h2 style="font-size:18px">Alle 30 Songs</h2>

    <button class="btn btn-secondary btn-small" onclick="showHome()" style="margin-top:8px">&#8592; Zur&uuml;ck</button>
  </div>
</div>

const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = 'user-modify-playback-state user-read-playback-state';

// ══════════════════════════════════════════════
// DEBUG LOG
// ══════════════════════════════════════════════
function log(msg, type = '') {
  const line = `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  ['debugLog','debugLogScan','debugLogSetup','debugLogPlay'].forEach(id => {

// ══════════════════════════════════════════════
// SPOTIFY PKCE OAuth
// ══════════════════════════════════════════════
function generateRandomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  for (let i = 0; i < length; i++) result += chars[arr[i] % chars.length];
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest('SHA-256', data);
}

function base64urlencode(buffer) {
  let str = '';
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < bytes.byteLength; i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function startSpotifyLogin(clientId) {
  spotifyClientId = clientId || SPOTIFY_CLIENT_ID;
  // Save client ID for after redirect
  try { sessionStorage.setItem('hitster_client_id', spotifyClientId); } catch(e) {}

  const codeVerifier = generateRandomString(64);
  try { sessionStorage.setItem('hitster_code_verifier', codeVerifier); } catch(e) {}

  const hashed = await sha256(codeVerifier);
  const codeChallenge = base64urlencode(hashed);

  const params = new URLSearchParams({
    response_type: 'code',
    client_id: clientId,
    scope: SCOPES,
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: codeChallenge,
  });

  log('Weiterleitung zu Spotify Login...', 'info');
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function handleSpotifyCallback(code) {
  let clientId, codeVerifier;
  try {
    clientId = sessionStorage.getItem('hitster_client_id');
    codeVerifier = sessionStorage.getItem('hitster_code_verifier');
  } catch(e) {}

  if (!clientId || !codeVerifier) {
    log('Session-Daten verloren. Bitte erneut verbinden.', 'err');
    showScreen('screen-setup');
    return;
  }

  log('Tausche Auth-Code gegen Token...', 'info');

  try {
    const resp = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: REDIRECT_URI,
        client_id: clientId,
        code_verifier: codeVerifier,
      }),
    });

    const data = await resp.json();

    if (data.access_token) {
      spotifyToken = data.access_token;
      spotifyClientId = clientId;
      log('Spotify Token erhalten!', 'info');

      // Save refresh token
      try {
        sessionStorage.setItem('hitster_token', data.access_token);
        if (data.refresh_token) sessionStorage.setItem('hitster_refresh', data.refresh_token);
      } catch(e) {}

      // Clean URL
      window.history.replaceState({}, '', window.location.pathname);

      // Check for pending card play
      const pendingCard = sessionStorage.getItem('hitster_pending_card');
      if (pendingCard) {
        sessionStorage.removeItem('hitster_pending_card');
        showScreen('screen-home');
        log('Spiele ausstehende Karte ' + pendingCard, 'info');
        playSong(parseInt(pendingCard));
      } else {
        showScreen('screen-home');
      }
    } else {
      log('Token-Fehler: ' + JSON.stringify(data), 'err');
      showScreen('screen-setup');
    }
  } catch(e) {
    log('Netzwerkfehler: ' + e.message, 'err');
    showScreen('screen-setup');
  }
}

async function refreshToken() {
  let refreshTok, clientId;
  try {
    refreshTok = sessionStorage.getItem('hitster_refresh');
    clientId = sessionStorage.getItem('hitster_client_id');
  } catch(e) { return false; }

  if (!refreshTok || !clientId) return false;

  try {
    const resp = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        refresh_token: refreshTok,
        client_id: clientId,
      }),
    });
    const data = await resp.json();
    if (data.access_token) {
      spotifyToken = data.access_token;
      try {
        sessionStorage.setItem('hitster_token', data.access_token);
        if (data.refresh_token) sessionStorage.setItem('hitster_refresh', data.refresh_token);
      } catch(e) {}
      log('Token erneuert', 'info');
      return true;
    }
  } catch(e) {}
  return false;
}

// Client ID ist hardcoded, kein Eingabefeld nötig

function spotifyLogout() {
  spotifyToken = null;
  try {
    sessionStorage.removeItem('hitster_token');
    sessionStorage.removeItem('hitster_refresh');
    sessionStorage.removeItem('hitster_client_id');
  } catch(e) {}
  showScreen('screen-setup');
}

// ══════════════════════════════════════════════
// SPOTIFY PLAYBACK CONTROL (Connect API)
// ══════════════════════════════════════════════
async function spotifyApi(endpoint, method = 'GET', body = null) {
  if (!spotifyToken) { log('Kein Token', 'err'); return null; }

  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + spotifyToken },
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }

  let resp = await fetch('https://api.spotify.com/v1' + endpoint, opts);

  // Token expired? Try refresh
  if (resp.status === 401) {
    log('Token abgelaufen, erneuere...', 'warn');
    const refreshed = await refreshToken();
    if (refreshed) {
      opts.headers['Authorization'] = 'Bearer ' + spotifyToken;
      resp = await fetch('https://api.spotify.com/v1' + endpoint, opts);
    } else {
      log('Token-Erneuerung fehlgeschlagen. Bitte neu verbinden.', 'err');
      spotifyLogout();
      return null;
    }
  }

  if (resp.status === 204) return {}; // No content = success for PUT
  if (!resp.ok) {
    const errData = await resp.json().catch(() => ({}));
    log('API Fehler ' + resp.status + ': ' + JSON.stringify(errData), 'err');
    return null;
  }
  return await resp.json().catch(() => ({}));
}

async function getActiveDevice(retries = 3) {
  for (let attempt = 1; attempt <= retries; attempt++) {
    log('Suche Spotify-Geräte (Versuch ' + attempt + '/' + retries + ')...', 'info');
    const data = await spotifyApi('/me/player/devices');
    if (data && data.devices && data.devices.length > 0) {
      const active = data.devices.find(d => d.is_active);
      const device = active || data.devices[0];
      log('Gerät gefunden: ' + device.name + ' (' + device.type + ')', 'info');
      return device;
    }
    if (attempt < retries) {
      log('Noch keine Geräte, warte 2s...', 'warn');
      await new Promise(r => setTimeout(r, 2000));
    }
  }

  // Last resort: try to get current playback state (sometimes devices endpoint is empty but player works)
  log('Versuche direkten Player-Zugriff...', 'info');
  const playerState = await spotifyApi('/me/player');
  if (playerState && playerState.device) {
    log('Gerät via Player gefunden: ' + playerState.device.name, 'info');
    return playerState.device;
  }

  log('Keine Spotify-Geräte nach ' + retries + ' Versuchen.', 'err');
  return null;
}

async function startPlayback(spotifyTrackId) {
  const device = await getActiveDevice();

  if (!device) {
    document.getElementById('playError').textContent =
      'Kein Spotify-Gerät gefunden. Öffne die Spotify-App, spiele kurz etwas ab, und versuche es dann erneut.';
    document.getElementById('playError').style.display = '';
    return false;
  }

  const result = await spotifyApi('/me/player/play?device_id=' + device.id, 'PUT', {
    uris: ['spotify:track:' + spotifyTrackId],
    position_ms: 0
  });

  if (result !== null) {
    log('Wiedergabe gestartet auf ' + device.name, 'info');
    document.getElementById('playError').style.display = 'none';
    return true;
  }
  return false;
}

async function stopPlayback() {
  await spotifyApi('/me/player/pause', 'PUT');
  log('Wiedergabe pausiert', 'info');
  showHome();
}

// ══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() {
  if (isScanning) stopScanner();
  scanProcessing = false;
  showScreen('screen-home');
  document.getElementById('manualInput').value = '';
}

// ══════════════════════════════════════════════
// QR SCANNER
// ══════════════════════════════════════════════
function startScanner() {
  showScreen('screen-scan');
  document.getElementById('debugLogScan').innerHTML = '';
  log('Scanner wird gestartet...', 'info');
  scanProcessing = false;

  scanner = new Html5Qrcode("qr-reader");
  isScanning = true;

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
    (decodedText) => {
      log('QR erkannt: "' + decodedText + '"', 'info');
      onScanSuccess(decodedText);
    },
    () => {}
  ).then(() => {
    log('Kamera aktiv. Scanne...', 'info');
  }).catch(err => {
    log('Kamera-Fehler: ' + err, 'err');
    alert("Kamera konnte nicht gestartet werden.");
    showHome();
  });
}

function stopScanner() {
  if (scanner && isScanning) {
    scanner.stop().then(() => { scanner.clear(); isScanning = false; }).catch(() => { isScanning = false; });
  }
}

function onScanSuccess(decodedText) {
  if (scanProcessing) return;
  scanProcessing = true;
  let cardNum = null;

  const urlMatch = decodedText.match(/[?&]card=(\d{1,2})/i);
  if (urlMatch) { cardNum = parseInt(urlMatch[1]); log('URL -> Karte ' + cardNum, 'info'); }

  if (!cardNum) {
    const textMatch = decodedText.match(/HITSTER-?(\d{1,2})/i);
    if (textMatch) { cardNum = parseInt(textMatch[1]); log('HITSTER -> Karte ' + cardNum, 'info'); }
  }

  if (!cardNum) {
    const n = parseInt(decodedText.trim());
    if (n >= 1 && n <= 30) { cardNum = n; log('Zahl -> Karte ' + cardNum, 'info'); }
  }

  if (cardNum && cardNum >= 1 && cardNum <= 30) {
    log('Starte Karte ' + cardNum, 'info');
    if (scanner && isScanning) {
      scanner.stop().then(() => { scanner.clear(); isScanning = false; playSong(cardNum); })
        .catch(() => { isScanning = false; playSong(cardNum); });
    } else {
      playSong(cardNum);
    }
  } else {
    log('Kein gueltiger Code: "' + decodedText.substring(0, 60) + '"', 'err');
    scanProcessing = false;
  }
}

// ══════════════════════════════════════════════
// PLAY SONG (Spotify Connect API – echtes Auto-Play!)
// ══════════════════════════════════════════════
async function playSong(cardNum) {
  const song = SONGS.find(s => s.id === cardNum);
  if (!song) return;

  log('Karte ' + cardNum + ' – starte Spotify Wiedergabe...', 'info');
  document.getElementById('playingNumber').textContent = cardNum;
  document.getElementById('playError').style.display = 'none';
  showScreen('screen-playing');

  const success = await startPlayback(song.spotify);
  if (success) {
    log('Karte ' + cardNum + ' spielt!', 'info');
  } else {
    log('Wiedergabe konnte nicht gestartet werden.', 'err');
  }
}

// ══════════════════════════════════════════════
// MANUAL INPUT
// ══════════════════════════════════════════════
function playManual() {
  const num = parseInt(document.getElementById('manualInput').value);
  if (num >= 1 && num <= 30) { log('Manuell: Karte ' + num, 'info'); playSong(num); }
}

// ══════════════════════════════════════════════
// URL PARAMETER & INIT
// ══════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);

  // Handle OAuth callback
  const code = params.get('code');
  if (code) {
    log('OAuth Callback empfangen', 'info');
    await handleSpotifyCallback(code);
    return;
  }

  // Handle card parameter (from QR code)
  const cardParam = params.get('card');
  if (cardParam) {
    const cardNum = parseInt(cardParam);
    if (cardNum >= 1 && cardNum <= 30) {
      window.history.replaceState({}, '', window.location.pathname);
      // Save pending card for after login
      try { sessionStorage.setItem('hitster_pending_card', cardNum.toString()); } catch(e) {}
    }
  }

  // Try restore session
  try {
    const savedToken = sessionStorage.getItem('hitster_token');
    const savedClientId = sessionStorage.getItem('hitster_client_id');
    if (savedToken && savedClientId) {
      spotifyToken = savedToken;
      spotifyClientId = savedClientId;
      log('Session wiederhergestellt', 'info');

      // Check if there's a pending card
      const pendingCard = sessionStorage.getItem('hitster_pending_card');
      if (pendingCard) {
        sessionStorage.removeItem('hitster_pending_card');
        showScreen('screen-home');
        playSong(parseInt(pendingCard));
        return;
      }

      showScreen('screen-home');
      return;
    }
  } catch(e) {}

  // No session – show setup
  log('Bitte Spotify verbinden', 'info');
  showScreen('screen-setup');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('manualInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') playManual(); });
  init();
});

// ══════════════════════════════════════════════
// SONG LIST (Spoiler)
// ══════════════════════════════════════════════
function showSongList() {
  document.getElementById('songGrid').innerHTML = SONGS.map(s => `
    <div class="song-item">
      <div class="song-num">${String(s.id).padStart(2,'0')}</div>
      <div style="flex:1"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div>
      <div class="song-year">${s.year}</div>
    </div>`).join('');
  showScreen('screen-songs');
}
</script>
